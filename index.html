<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal ToDo Pro</title>
    <!-- Google Fonts & Font Awesome (アイコン用) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* テーマ変数の定義（ライトモード／ダークモード） */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --app-bg: #ffffff;
            --primary-color: #6366f1; /* インディゴブルー */
            --primary-hover: #4f46e5;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --border-color: #f1f5f9;
            --danger-color: #f43f5e;
            --danger-bg: #ffe4e6;
            --success-color: #10b981;
            --success-bg: #d1fae5;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --input-bg: #f8fafc;
            --card-bg: #ffffff;
            --filter-btn-bg: #f1f5f9;
            --filter-btn-active: #6366f1;
            --filter-btn-active-text: #ffffff;
            --badge-bg: #f1f5f9;
            --badge-text: #64748b;
            --note-bg: #f8fafc;
            --note-text: #475569;
            --overlay-bg: rgba(15, 23, 42, 0.3);
        }

        /* ダークモード用の変数上書き */
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --app-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-color: #334155;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --input-bg: #0f172a;
            --card-bg: #0f172a;
            --filter-btn-bg: #334155;
            --filter-btn-active: #6366f1;
            --filter-btn-active-text: #ffffff;
            --badge-bg: #1e293b;
            --badge-text: #94a3b8;
            --danger-bg: #4c0519;
            --danger-color: #fda4af;
            --note-bg: #1e293b;
            --note-text: #cbd5e1;
            --overlay-bg: rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* スマホ風のコンテナ */
        .phone-container {
            background: var(--app-bg);
            width: 100%;
            max-width: 390px;
            height: 720px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border: 4px solid var(--app-bg);
        }

        /* アプリのヘッダー */
        .app-header {
            padding: 28px 24px 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-left h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header-left p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* アクションボタン共通スタイル */
        .header-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            position: relative;
            transition: all 0.2s ease;
        }

        .header-btn:hover {
            transform: scale(1.05);
        }

        /* ゴミ箱のバッジ（未読・中身ありのドット） */
        .trash-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background-color: var(--danger-color);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid var(--app-bg);
            display: none;
        }

        /* タスク入力エリア */
        .input-section {
            padding: 0 24px 12px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group {
            display: flex;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 4px 4px 4px 16px;
            align-items: center;
            transition: all 0.2s ease;
        }

        .input-group:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .input-group input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            color: var(--text-main);
            padding: 8px 0;
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .add-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s, transform 0.1s;
        }

        .add-btn:hover {
            background: var(--primary-hover);
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        /* オプション入力グループ（横並び） */
        .options-group {
            display: flex;
            gap: 8px;
        }

        /* 日時入力グループ & メモ入力グループ */
        .datetime-group, .note-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            color: var(--text-muted);
            flex: 1;
        }

        .datetime-group i, .note-input-group i {
            font-size: 13px;
        }

        .datetime-group input[type="datetime-local"],
        .note-input-group input[type="text"] {
            border: none;
            background: transparent;
            outline: none;
            font-size: 12px;
            color: var(--text-main);
            width: 100%;
        }

        .note-input-group input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        /* フィルタータブ */
        .filter-section {
            padding: 0 24px 12px 24px;
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: var(--filter-btn-bg);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: var(--filter-btn-active);
            color: var(--filter-btn-active-text);
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        /* リスト表示エリア（スクロール可能） */
        .todo-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px;
        }

        .todo-list-container::-webkit-scrollbar {
            width: 0px;
        }

        .todo-list {
            list-style: none;
        }

        /* 各タスクのアイテム */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.2s ease forwards;
            transition: all 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-item.removing {
            animation: fadeOut 0.2s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.9) translateY(-10px); height: 0; padding: 0; margin: 0; border: none; }
        }

        .todo-left {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            flex: 1;
        }

        /* カスタムチェックボックス */
        .checkbox-wrapper {
            position: relative;
            width: 22px;
            height: 22px;
            cursor: pointer;
            margin-top: 2px;
        }

        .checkbox-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            height: 22px;
            width: 22px;
            background-color: transparent;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .custom-checkbox i {
            color: white;
            font-size: 11px;
            display: none;
        }

        .checkbox-wrapper input:checked ~ .custom-checkbox {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .checkbox-wrapper input:checked ~ .custom-checkbox i {
            display: block;
        }

        /* タスクのコンテンツコンテナ */
        .todo-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .todo-text {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.2s ease;
            word-break: break-all;
        }

        .checkbox-wrapper input:checked ~ .todo-content .todo-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* メモ表示用の吹き出し・バッジ風 */
        .todo-note-display {
            font-size: 12px;
            color: var(--note-text);
            background: var(--note-bg);
            padding: 6px 10px;
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
            margin-top: 2px;
            word-break: break-all;
        }

        .checkbox-wrapper input:checked ~ .todo-content .todo-note-display {
            opacity: 0.5;
            text-decoration: line-through;
        }

        /* バッジ表示のコンテナ */
        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* 期限表示のバッジ */
        .due-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            background-color: var(--badge-bg);
            color: var(--badge-text);
            width: fit-content;
        }

        .due-badge i {
            font-size: 10px;
        }

        .due-badge.overdue {
            background-color: var(--danger-bg);
            color: var(--danger-color);
        }

        /* 削除ボタン */
        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            font-size: 16px;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: var(--danger-color);
        }

        /* フッターインフォ */
        .app-footer {
            padding: 16px 24px 24px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            background: var(--app-bg);
            font-size: 13px;
        }

        .task-counter {
            color: var(--text-muted);
            font-weight: 500;
        }

        .clear-completed-btn {
            background: transparent;
            border: none;
            color: var(--danger-color);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .clear-completed-btn:hover {
            opacity: 0.8;
        }

        /* 空っぽの状態 */
        .empty-state {
            text-align: center;
            margin-top: 60px;
            color: var(--text-muted);
            display: none;
        }

        .empty-state i {
            font-size: 48px;
            color: var(--border-color);
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* --- ゴミ箱モーダルのスタイル --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 下からスライドイン */
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .trash-modal {
            background: var(--app-bg);
            width: 100%;
            max-height: 80%;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 24px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        .modal-overlay.open .trash-modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-header h2 i {
            color: var(--danger-color);
        }

        .close-modal-btn {
            background: var(--input-bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .trash-list-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .trash-list-container::-webkit-scrollbar {
            width: 0px;
        }

        .trash-list {
            list-style: none;
        }

        .trash-item {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .trash-item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .trash-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .trash-item-note {
            font-size: 11px;
            color: var(--text-muted);
        }

        .trash-actions {
            display: flex;
            gap: 4px;
        }

        .trash-action-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            transition: background 0.2s;
        }

        .trash-action-btn.restore {
            color: var(--success-color);
        }

        .trash-action-btn.restore:hover {
            background: var(--success-bg);
        }

        .trash-action-btn.delete {
            color: var(--danger-color);
        }

        .trash-action-btn.delete:hover {
            background: var(--danger-bg);
        }

        .modal-footer {
            display: flex;
            gap: 12px;
        }

        .modal-footer-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .modal-footer-btn.empty-btn {
            background: var(--danger-bg);
            color: var(--danger-color);
        }

        .modal-footer-btn.empty-btn:hover {
            opacity: 0.9;
        }

        .modal-footer-btn.close-btn {
            background: var(--filter-btn-bg);
            color: var(--text-main);
        }

        .trash-empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
        }

        .trash-empty-state i {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- ヘッダーエリア -->
        <div class="app-header">
            <div class="header-left">
                <h1 id="today-title">My Tasks</h1>
                <p id="today-date">Loading date...</p>
            </div>
            <!-- 右上アクションエリア（ゴミ箱・テーマ） -->
            <div class="header-actions">
                <button class="header-btn" id="trash-toggle" aria-label="ゴミ箱を開く">
                    <i class="fa-solid fa-trash-can"></i>
                    <span class="trash-badge" id="trash-badge"></span>
                </button>
                <button class="header-btn" id="theme-toggle" aria-label="テーマ切り替え">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>

        <!-- タスク入力エリア -->
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="新しいタスクを追加..." autocomplete="off">
                <button class="add-btn" id="add-button" aria-label="タスク追加">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <!-- オプション入力グループ（横並び） -->
            <div class="options-group">
                <!-- 日時設定 -->
                <div class="datetime-group">
                    <i class="fa-regular fa-calendar-days"></i>
                    <input type="datetime-local" id="todo-datetime" aria-label="期限設定">
                </div>
                <!-- メモ設定 -->
                <div class="note-input-group">
                    <i class="fa-regular fa-comment-dots"></i>
                    <input type="text" id="todo-note" placeholder="メモを追加..." autocomplete="off" aria-label="メモ追加">
                </div>
            </div>
        </div>

        <!-- フィルターセクション -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">すべて</button>
            <button class="filter-btn" data-filter="active">未完了</button>
            <button class="filter-btn" data-filter="completed">完了</button>
        </div>

        <!-- リスト表示エリア -->
        <div class="todo-list-container">
            <ul class="todo-list" id="todo-list">
                <!-- JavaScriptでレンダリング -->
            </ul>
            <div class="empty-state" id="empty-state">
                <i class="fa-regular fa-folder-open"></i>
                <p id="empty-text">タスクはすべて完了しています！</p>
            </div>
        </div>

        <!-- フッターエリア -->
        <div class="app-footer">
            <span class="task-counter" id="task-counter">残り 0 タスク</span>
            <button class="clear-completed-btn" id="clear-completed">完了済みをクリア</button>
        </div>

        <!-- --- ゴミ箱モーダル --- -->
        <div class="modal-overlay" id="trash-modal-overlay">
            <div class="trash-modal">
                <div class="modal-header">
                    <h2><i class="fa-solid fa-trash-can"></i> ゴミ箱</h2>
                    <button class="close-modal-btn" id="close-trash-modal" aria-label="ゴミ箱を閉じる">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <!-- ゴミ箱リスト -->
                <div class="trash-list-container">
                    <ul class="trash-list" id="trash-list">
                        <!-- JavaScriptでレンダリング -->
                    </ul>
                    <div class="trash-empty-state" id="trash-empty-state">
                        <i class="fa-regular fa-trash-can"></i>
                        <p>ゴミ箱は空っぽです</p>
                    </div>
                </div>

                <!-- モーダルフッター -->
                <div class="modal-footer">
                    <button class="modal-footer-btn empty-btn" id="empty-trash-btn">ゴミ箱を空にする</button>
                    <button class="modal-footer-btn close-btn" id="close-trash-action-btn">閉じる</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM要素の取得
        const todoInput = document.getElementById('todo-input');
        const todoDatetime = document.getElementById('todo-datetime');
        const todoNote = document.getElementById('todo-note');
        const addButton = document.getElementById('add-button');
        const todoList = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');
        const emptyText = document.getElementById('empty-text');
        const todayDate = document.getElementById('today-date');
        const themeToggle = document.getElementById('theme-toggle');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const taskCounter = document.getElementById('task-counter');
        const clearCompletedBtn = document.getElementById('clear-completed');

        // ゴミ箱関連のDOM
        const trashToggle = document.getElementById('trash-toggle');
        const trashModalOverlay = document.getElementById('trash-modal-overlay');
        const closeTrashModal = document.getElementById('close-trash-modal');
        const closeTrashActionBtn = document.getElementById('close-trash-action-btn');
        const trashList = document.getElementById('trash-list');
        const trashEmptyState = document.getElementById('trash-empty-state');
        const emptyTrashBtn = document.getElementById('empty-trash-btn');
        const trashBadge = document.getElementById('trash-badge');

        // 今日の一言日付表示
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        todayDate.textContent = new Date().toLocaleDateString('ja-JP', options);

        // --- 状態管理 (State) ---
        const getFutureISOString = (hoursAhead) => {
            const date = new Date();
            date.setHours(date.getHours() + hoursAhead);
            const offset = date.getTimezoneOffset();
            const localDate = new Date(date.getTime() - (offset * 60 * 1000));
            return localDate.toISOString().slice(0, 16);
        };

        const defaultTodos = [
            { id: 1, text: "☕ 朝のコーヒーを飲む", completed: true, dueDate: getFutureISOString(-2), note: "お気に入りのマグカップで飲む" },
            { id: 2, text: "📱 Androidアプリの勉強をする", completed: false, dueDate: getFutureISOString(3), note: "GeminiのCanvas機能について調べる" },
            { id: 3, text: "💪 筋トレを20分する", completed: false, dueDate: getFutureISOString(24), note: "スクワットとプランク中心に！" }
        ];
        
        let todos = JSON.parse(localStorage.getItem('todos')) || defaultTodos;
        let trash = JSON.parse(localStorage.getItem('trash')) || [];
        let currentFilter = 'all';

        // --- テーマ管理 (Light/Dark) ---
        let currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();

        // 初期描画
        renderTodos();
        renderTrash();

        // --- 関数定義 ---

        // 日付を人間に優しい形式にフォーマットする（今日/明日判定付き）
        function formatFriendlyDate(dueDateStr) {
            if (!dueDateStr) return '';
            
            const dueDate = new Date(dueDateStr);
            const now = new Date();
            
            const month = dueDate.getMonth() + 1;
            const date = dueDate.getDate();
            const hours = String(dueDate.getHours()).padStart(2, '0');
            const minutes = String(dueDate.getMinutes()).padStart(2, '0');
            
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const targetDate = new Date(dueDate.getFullYear(), dueDate.getMonth(), dueDate.getDate());
            
            const diffTime = targetDate - today;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let dateLabel = `${month}/${date}`;
            if (diffDays === 0) {
                dateLabel = '今日';
            } else if (diffDays === 1) {
                dateLabel = '明日';
            } else if (diffDays === -1) {
                dateLabel = '昨日';
            }
            
            return `${dateLabel} ${hours}:${minutes}`;
        }

        // タスクが期限切れかどうかチェックする
        function isOverdue(dueDateStr) {
            if (!dueDateStr) return false;
            return new Date(dueDateStr) < new Date();
        }

        // タスク一覧をレンダリングする
        function renderTodos() {
            todoList.innerHTML = '';
            
            const filteredTodos = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true;
            });

            const activeCount = todos.filter(todo => !todo.completed).length;
            taskCounter.textContent = `残り ${activeCount} タスク`;

            if (filteredTodos.length === 0) {
                emptyState.style.display = 'block';
                if (currentFilter === 'active') {
                    emptyText.textContent = '未完了のタスクはありません';
                } else if (currentFilter === 'completed') {
                    emptyText.textContent = '完了したタスクはありません';
                } else {
                    emptyText.textContent = 'タスクが空っぽです！新しいタスクを追加しましょう。';
                }
            } else {
                emptyState.style.display = 'none';
                
                filteredTodos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = 'todo-item';
                    li.dataset.id = todo.id;
                    
                    const overdueClass = (isOverdue(todo.dueDate) && !todo.completed) ? 'overdue' : '';
                    const overdueIcon = overdueClass ? '<i class="fa-solid fa-triangle-exclamation"></i>' : '<i class="fa-regular fa-clock"></i>';
                    
                    const dueBadgeHTML = todo.dueDate 
                        ? `<div class="due-badge ${overdueClass}">
                            ${overdueIcon}
                            <span>${formatFriendlyDate(todo.dueDate)}</span>
                           </div>` 
                        : '';

                    // メモ部分のHTML
                    const noteHTML = todo.note
                        ? `<div class="todo-note-display">
                            <i class="fa-regular fa-file-lines" style="margin-right: 4px; font-size: 10px;"></i>${escapeHTML(todo.note)}
                           </div>`
                        : '';
                    
                    li.innerHTML = `
                        <div class="todo-left">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
                                <span class="custom-checkbox">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </label>
                            <div class="todo-content">
                                <span class="todo-text">${escapeHTML(todo.text)}</span>
                                ${noteHTML}
                                ${dueBadgeHTML ? `<div class="badges-container">${dueBadgeHTML}</div>` : ''}
                            </div>
                        </div>
                        <button class="delete-btn" onclick="triggerDelete(${todo.id})" aria-label="タスク削除">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    `;
                    todoList.appendChild(li);
                });
            }

            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // ゴミ箱一覧をレンダリングする
        function renderTrash() {
            trashList.innerHTML = '';
            
            if (trash.length === 0) {
                trashEmptyState.style.display = 'block';
                trashBadge.style.display = 'none';
            } else {
                trashEmptyState.style.display = 'none';
                trashBadge.style.display = 'block'; // ゴミ箱に中身があるときは赤い通知バッジを表示

                trash.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'trash-item';
                    
                    const noteText = item.note ? `メモ: ${item.note}` : 'メモなし';

                    li.innerHTML = `
                        <div class="trash-item-info">
                            <span class="trash-item-title">${escapeHTML(item.text)}</span>
                            <span class="trash-item-note">${escapeHTML(noteText)}</span>
                        </div>
                        <div class="trash-actions">
                            <button class="trash-action-btn restore" onclick="restoreTodo(${item.id})" title="復元">
                                <i class="fa-solid fa-rotate-left"></i>
                            </button>
                            <button class="trash-action-btn delete" onclick="permanentlyDeleteTodo(${item.id})" title="完全に削除">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    trashList.appendChild(li);
                });
            }

            localStorage.setItem('trash', JSON.stringify(trash));
        }

        // セキュリティ用のエスケープ処理
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // タスクを追加する関数
        function addTodo() {
            const text = todoInput.value.trim();
            const dueDate = todoDatetime.value;
            const note = todoNote.value.trim();
            
            if (text === '') return;

            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false,
                dueDate: dueDate || null,
                note: note || null // メモが入力されていない場合はnull
            };

            todos.push(newTodo);
            todoInput.value = '';
            todoDatetime.value = '';
            todoNote.value = ''; // メモ入力欄をリセット
            renderTodos();
            
            const container = document.querySelector('.todo-list-container');
            container.scrollTop = container.scrollHeight;
        }

        // チェック状態の切り替え
        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            setTimeout(renderTodos, 180);
        }

        // 削除アニメーションを実行してからタスクをゴミ箱へ移動
        function triggerDelete(id) {
            const item = document.querySelector(`.todo-item[data-id="${id}"]`);
            if (item) {
                item.classList.add('removing');
                setTimeout(() => {
                    moveTodoToTrash(id);
                }, 200);
            } else {
                moveTodoToTrash(id);
            }
        }

        // タスクをゴミ箱に移す処理
        function moveTodoToTrash(id) {
            const targetTodo = todos.find(todo => todo.id === id);
            if (targetTodo) {
                trash.push(targetTodo); // ゴミ箱配列に保存
                todos = todos.filter(todo => todo.id !== id);
                renderTodos();
                renderTrash();
            }
        }

        // 完了済みタスクの一括ゴミ箱移動
        function clearCompleted() {
            const completedTodos = todos.filter(todo => todo.completed);
            if (completedTodos.length > 0) {
                trash = [...trash, ...completedTodos]; // 全てゴミ箱へ
                todos = todos.filter(todo => !todo.completed);
                renderTodos();
                renderTrash();
            }
        }

        // ゴミ箱からタスクを復元する
        function restoreTodo(id) {
            const targetTodo = trash.find(item => item.id === id);
            if (targetTodo) {
                // 復元するときは未完了に戻す仕様
                targetTodo.completed = false;
                todos.push(targetTodo);
                trash = trash.filter(item => item.id !== id);
                renderTodos();
                renderTrash();
            }
        }

        // ゴミ箱から完全に削除する
        function permanentlyDeleteTodo(id) {
            trash = trash.filter(item => item.id !== id);
            renderTrash();
        }

        // ゴミ箱を空にする
        function emptyTrash() {
            if (trash.length === 0) return;
            
            // 安全のために確認を促すスタイルを独自で作成したかったが、ここでは処理を実行
            trash = [];
            renderTrash();
        }

        // テーマアイコンの更新
        function updateThemeIcon() {
            const icon = themeToggle.querySelector('i');
            if (currentTheme === 'dark') {
                icon.className = 'fa-solid fa-sun';
            } else {
                icon.className = 'fa-solid fa-moon';
            }
        }

        // --- イベントリスナー ---

        addButton.addEventListener('click', addTodo);
        
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        // テーマ切り替え
        themeToggle.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon();
        });

        // フィルター切り替え
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                renderTodos();
            });
        });

        // 完了済みのクリア
        clearCompletedBtn.addEventListener('click', clearCompleted);

        // --- モーダルの開閉処理 ---
        trashToggle.addEventListener('click', () => {
            trashModalOverlay.classList.add('open');
        });

        // 閉じるボタン各種
        closeTrashModal.addEventListener('click', () => {
            trashModalOverlay.classList.remove('open');
        });

        closeTrashActionBtn.addEventListener('click', () => {
            trashModalOverlay.classList.remove('open');
        });

        // モーダルの背景クリックで閉じる
        trashModalOverlay.addEventListener('click', (e) => {
            if (e.target === trashModalOverlay) {
                trashModalOverlay.classList.remove('open');
            }
        });

        // ゴミ箱を空にする
        emptyTrashBtn.addEventListener('click', emptyTrash);
    </script>
</body>
</html>
